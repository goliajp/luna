name: cargo-deny

# Supply-chain gate. cargo-deny's [advisories] section consumes the
# RustSec database (same source as cargo-audit), plus [licenses]
# (no GPL contamination) and [bans] (no duplicate versions /
# wildcard deps). A separate cargo-audit workflow would be
# redundant; deny.toml is the single source of truth.

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    # Weekly check catches new advisories that hit existing pins
    - cron: '0 4 * * 1'  # Monday 04:00 UTC
  workflow_dispatch:

jobs:
  cargo-deny:
    name: cargo deny check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          log-level: warn
          # Match deny.toml's [graph] config (`all-features = false`,
          # `no-default-features = false` → default features per crate).
          # cargo-deny-action's default invocation adds `--all-features`,
          # which enables every optional dep across the workspace — in
          # particular pulling `inferno` (CDDL-1.0 copyleft, gated behind
          # luna-tools' opt-in `flame-graph` feature) into the license
          # check. The project charter ("permissive only, no copyleft
          # contamination") rejects CDDL by design; users who opt into
          # `flame-graph` accept the copyleft license explicitly when
          # they enable the feature. Matching local `cargo deny check`
          # behavior keeps CI honest without widening the allow-list.
          arguments: --hide-inclusion-graph

  luna-core-zero-dep:
    name: luna-core 0 third-party dep contract (F1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo tree -p luna-core
        run: |
          set -euo pipefail
          # `--edges normal` excludes dev-dependencies (e.g. `dhat`, used
          # by the v2.0 Track MM `mem_baseline` bench) and build-deps —
          # those never link into the published crate, so the F1
          # 0-third-party-dep contract is preserved.
          OUTPUT=$(cargo tree -p luna-core --prefix none --edges normal)
          echo "$OUTPUT"
          COUNT=$(echo "$OUTPUT" | grep -cE ' v[0-9]')
          echo "third-party prod dep count: $((COUNT - 1))"
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::luna-core must depend on zero third-party prod crates (F1 contract). Found $COUNT crates in tree."
            exit 1
          fi
