name: cargo-deny

# Supply-chain gate. cargo-deny's [advisories] section consumes the
# RustSec database (same source as cargo-audit), plus [licenses]
# (no GPL contamination) and [bans] (no duplicate versions /
# wildcard deps). A separate cargo-audit workflow would be
# redundant; deny.toml is the single source of truth.

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    # Weekly check catches new advisories that hit existing pins
    - cron: '0 4 * * 1'  # Monday 04:00 UTC
  workflow_dispatch:

jobs:
  cargo-deny:
    name: cargo deny check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          log-level: warn
          # `--hide-inclusion-graph` is a `check` sub-command option,
          # not a cargo-deny global option. cargo-deny-action's
          # `arguments` input is placed BEFORE the sub-command, so it
          # must hold global flags only; sub-command flags go via
          # `command-arguments` which appears AFTER. Putting this in
          # `arguments` triggers
          #   error: unexpected argument '--hide-inclusion-graph' found
          #   tip: 'check --hide-inclusion-graph' exists
          # at action startup. (Real license check still runs via
          # deny.toml's `[licenses]` exceptions table, including the
          # per-crate CDDL-1.0 exception for `inferno` pulled in via
          # luna-tools' opt-in `flame-graph` feature.)
          command-arguments: --hide-inclusion-graph

  luna-core-zero-dep:
    name: luna-core 0 third-party dep contract (F1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo tree -p luna-core
        run: |
          set -euo pipefail
          # `--edges normal` excludes dev-dependencies (e.g. `dhat`, used
          # by the v2.0 Track MM `mem_baseline` bench) and build-deps —
          # those never link into the published crate, so the F1
          # 0-third-party-dep contract is preserved.
          OUTPUT=$(cargo tree -p luna-core --prefix none --edges normal)
          echo "$OUTPUT"
          COUNT=$(echo "$OUTPUT" | grep -cE ' v[0-9]')
          echo "third-party prod dep count: $((COUNT - 1))"
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::luna-core must depend on zero third-party prod crates (F1 contract). Found $COUNT crates in tree."
            exit 1
          fi
