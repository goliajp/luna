name: ci

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Native build + test matrix.
  # Stable toolchain across three OS × the standard cargo commands.
  # ─────────────────────────────────────────────────────────────────
  native:
    name: ${{ matrix.os }} stable
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      # v2.1 CI blocker fix: exclude LLVM-backed alt-backend crates.
      # `llvm-jit-probe` + `luna-jit-llvm` unconditionally link inkwell
      # → llvm-sys → system LLVM 18 + Polly; none of the hosted runners
      # (ubuntu-latest / macos-latest / windows-latest) ship LLVM 18 +
      # Polly out of the box (`could not find native static library
      # Polly`). They are dev-only alt-backend audit crates (v2.1
      # Cranelift alt-backend RFC) outside the embedder surface; their
      # build/test gating lives in a dedicated developer-host workflow
      # to be added when the alt-backend lands real production code.
      - name: cargo build --workspace
        run: cargo build --workspace --all-targets --exclude llvm-jit-probe --exclude luna-jit-llvm
      - name: cargo test --workspace --lib
        run: cargo test --workspace --lib --exclude llvm-jit-probe --exclude luna-jit-llvm
      - name: cargo test --workspace --release
        # `--nocapture` propagates test-side eprintln + println straight
        # to the CI log so a process-level abort (SIGSEGV / SIGILL / signal:
        # N) leaves the `[official_run] starting Lua5X/file.lua` trail
        # visible — without it, cargo test buffers per-test output and a
        # hard abort drops the buffer. RUST_BACKTRACE=full prints the
        # panic stack so we can see WHICH builtin returned to the
        # corrupted self.stack when sort.lua trips the Linux glibc heap
        # corruption pattern (`nat_return` sentinel panic with
        # pointer-sized `len` field).
        env:
          RUST_BACKTRACE: full
        run: cargo test --workspace --release --exclude llvm-jit-probe --exclude luna-jit-llvm -- --nocapture
      - name: cargo test --doc --workspace
        run: cargo test --doc --workspace --exclude llvm-jit-probe --exclude luna-jit-llvm

  # ─────────────────────────────────────────────────────────────────
  # wasm32 build of luna-core only (luna pulls Cranelift, which has
  # no wasm32 target). Proves the 0-dep core also satisfies the
  # wasm portability contract documented in docs/architecture.md.
  # ─────────────────────────────────────────────────────────────────
  wasm32:
    name: wasm32-unknown-unknown — luna-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: cargo build -p luna-core --target wasm32-unknown-unknown
        run: cargo build -p luna-core --target wasm32-unknown-unknown
      - name: cargo build -p luna-core --target wasm32-unknown-unknown --release
        run: cargo build -p luna-core --target wasm32-unknown-unknown --release

  # ─────────────────────────────────────────────────────────────────
  # v1.3 Phase WW: wasm32-wasip1 build of luna-core. Mirrors the
  # `wasm32` job above. wasip1 has more std::process surface than
  # wasm32-unknown-unknown, so `io.popen` / `os.execute` are
  # cfg-gated on `any(unix, windows)`; wasi gets a stub that returns
  # the PUC error tuple `(nil, "popen not supported on this platform", -1)`.
  # See .dev/rfcs/v1.3-audit-wasi-port.md for the gating shape.
  #
  # Smoke (Phase WW4 follow-up, not yet wired): install `wasmtime`
  # via `curl https://wasmtime.dev/install.sh | bash`, build
  # `crates/luna-core/examples/wasi_smoke.rs` (to be created) for
  # wasm32-wasip1, and run it via `wasmtime run`. The smoke would
  # exercise dispatcher / GC / base lib / `eval` under the wasi
  # runtime — far stronger than build-only. The build-only gate
  # below catches the regression class we care about today
  # (cfg-gate forgotten on a new `std::process::*` use).
  # ─────────────────────────────────────────────────────────────────
  wasm32-wasip1:
    name: wasm32-wasip1 — luna-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: cargo build -p luna-core --target wasm32-wasip1
        run: cargo build -p luna-core --target wasm32-wasip1
      - name: cargo build -p luna-core --target wasm32-wasip1 --release
        run: cargo build -p luna-core --target wasm32-wasip1 --release

  # ─────────────────────────────────────────────────────────────────
  # cargo doc: catches dangling intra-doc links and undocumented
  # public items (luna-core declares missing_docs warn-by-default
  # in lib.rs once F2 lands; for v1.1 in progress this stays soft).
  # ─────────────────────────────────────────────────────────────────
  doc:
    name: cargo doc --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo doc --workspace --no-deps
        # See the `native` job comment for the LLVM exclusion rationale.
        run: cargo doc --workspace --no-deps --exclude llvm-jit-probe --exclude luna-jit-llvm
        env:
          RUSTDOCFLAGS: -D warnings

  # ─────────────────────────────────────────────────────────────────
  # v1.2 L4-L5: lint gates (fmt + clippy). The 606 fmt drift was cleared
  # in v1.2 L1; the 12 historic clippy errors in L2; workspace-level
  # `[lints.clippy]` policy in L6. From v1.2 forward, both gates fail
  # the build on any new drift.
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check
      - name: cargo clippy --workspace --all-targets -- -D warnings
        # See the `native` job comment for the LLVM exclusion rationale.
        run: cargo clippy --workspace --all-targets --exclude llvm-jit-probe --exclude luna-jit-llvm -- -D warnings

  # ─────────────────────────────────────────────────────────────────
  # v1.2 D2 (P-A1 audit): perf-gate bench job. Linux runner + taskset
  # for ~1-2% variance band on `redis_lua_shape`. Manual trigger only
  # until D6 lands the regression-detection gate. macOS local: ~2.5%
  # via `cargo bench --bench redis_lua_shape`.
  #
  # The hosted ubuntu-latest is shared infra; taskset gives a soft
  # CPU pin (one core). criterion's 100-sample / 8s measurement window
  # absorbs the residual jitter.
  # ─────────────────────────────────────────────────────────────────
  perf-gate:
    name: redis_lua_shape perf-gate (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo bench --bench redis_lua_shape (taskset -c 1)
        run: taskset -c 1 cargo bench --bench redis_lua_shape -- --measurement-time 8 --warm-up-time 2

  # ─────────────────────────────────────────────────────────────────
  # v1.1 F1 + v1.2 G: luna-core's 0 third-party dep contract.
  # `cargo tree -p luna-core --prefix none --edges normal` lists exactly
  # one crate (luna-core itself); anything else is a prod-dep regression.
  # `--edges normal` excludes dev-dependencies (e.g. `dhat`, used by the
  # v2.0 Track MM `mem_baseline` bench) and build-dependencies — those
  # never link into the published crate, so the F1 0-third-party-dep
  # contract is preserved. CI fails fast on regression.
  # ─────────────────────────────────────────────────────────────────
  zero-dep:
    name: luna-core zero-third-party-dep contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo tree -p luna-core
        run: |
          count=$(cargo tree -p luna-core --prefix none --no-default-features --edges normal 2>/dev/null \
                  | grep -cE ' v[0-9]')
          echo "luna-core prod dep count = $count"
          if [ "$count" != "1" ]; then
            echo "::error::luna-core gained a third-party prod dependency (count=$count, expected 1)"
            cargo tree -p luna-core --prefix none --no-default-features --edges normal
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────
  # v1.3 R3: build the optional `repl-line-editor` feature so
  # rustyline-side bit-rot doesn't surprise us at release time. The
  # default `cargo install luna-jit` (no feature) is already covered
  # by the `native` matrix above; this job adds the feature-on flavour
  # + clippy gate to keep the LuaHelper / highlighter trait wiring
  # honest. luna-core's 0-third-party-dep contract is unaffected
  # (rustyline lives in luna-jit only) — verified by the `zero-dep`
  # job above.
  # ─────────────────────────────────────────────────────────────────
  repl-line-editor:
    name: luna-jit --features repl-line-editor build + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo build -p luna-jit --features repl-line-editor
        run: cargo build -p luna-jit --features repl-line-editor
      - name: cargo clippy -p luna-jit --bin luna --features repl-line-editor -- -D warnings
        run: cargo clippy -p luna-jit --bin luna --features repl-line-editor -- -D warnings

  # ─────────────────────────────────────────────────────────────────
  # v2.0 CV gap fill: feature="send" matrix coverage. SendVm is the
  # cross-thread embedding path; its tests live in
  # `crates/luna-core/tests/send_vm.rs` and are gated behind
  # `#[cfg(feature = "send")]`. Without an explicit CI job, the
  # default `cargo test` invocation never exercises the feature,
  # so SendVm bit-rot would only surface at a release-time smoke.
  # This job builds + clippies + tests luna-core with the feature
  # flipped on so any regression in the lock / UnsafeCell wrapper
  # lands as a red gate.
  # ─────────────────────────────────────────────────────────────────
  send-feature:
    name: luna-core --features send build + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo build -p luna-core --features send
        run: cargo build -p luna-core --features send
      - name: cargo clippy -p luna-core --features send --tests -- -D warnings
        run: cargo clippy -p luna-core --features send --tests -- -D warnings
      - name: cargo test -p luna-core --features send --test send_vm
        run: cargo test -p luna-core --features send --test send_vm

  # ─────────────────────────────────────────────────────────────────
  # G2: unsafe-usage drift detection (introduced in the v1.3 mega
  # sprint Phase A — formerly tagged v1.2 G2).
  #
  # Counts `unsafe (\{|fn |impl |trait |extern )` sites across first-party
  # src trees and fails CI if the count exceeds the recorded ceiling.
  # Cheap (no cargo-geiger install) and catches the common case:
  # someone adds an `unsafe { ... }` block to silence a borrow-check
  # error rather than fix the root cause.
  #
  # Baseline: docs/unsafe-accounting.md §"v1.1 snapshot" recorded 461
  # sites at v1.1.0 ship. Phase A (LuaUserdata trait sugar) brought the
  # count up by ~15 → ceiling 490 with ~14 slots of headroom. v1.3
  # subsequent phases (Send-safety SendVm fork, userdata Trace-bearing
  # GC ripple, luna-aot codegen) will need explicit ceiling bumps as
  # each justified unsafe addition lands. Never widen to a round number
  # to silence drift.
  # ─────────────────────────────────────────────────────────────────
  unsafe-drift:
    name: unsafe-usage drift detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: count first-party unsafe sites
        run: |
          count=$(grep -rE 'unsafe (\{|fn |impl |trait |extern )' \
                  crates/luna-core/src crates/luna-jit/src | wc -l | tr -d ' ')
          ceiling=490
          echo "first-party unsafe sites: $count (ceiling $ceiling)"
          echo "v1.1 snapshot was 461 — see docs/unsafe-accounting.md"
          if [ "$count" -gt "$ceiling" ]; then
            echo "::error::unsafe count $count exceeds ceiling $ceiling"
            echo "Either justify the new unsafe (and bump the ceiling in ci.yml) or refactor."
            exit 1
          fi
