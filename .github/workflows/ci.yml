name: ci

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Native build + test matrix.
  # Stable toolchain across three OS × the standard cargo commands.
  # ─────────────────────────────────────────────────────────────────
  native:
    name: ${{ matrix.os }} stable
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build --workspace
        run: cargo build --workspace --all-targets
      - name: cargo test --workspace --lib
        run: cargo test --workspace --lib
      - name: cargo test --workspace --release
        run: cargo test --workspace --release
      - name: cargo test --doc --workspace
        run: cargo test --doc --workspace

  # ─────────────────────────────────────────────────────────────────
  # wasm32 build of luna-core only (luna pulls Cranelift, which has
  # no wasm32 target). Proves the 0-dep core also satisfies the
  # wasm portability contract documented in docs/architecture.md.
  # ─────────────────────────────────────────────────────────────────
  wasm32:
    name: wasm32-unknown-unknown — luna-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: cargo build -p luna-core --target wasm32-unknown-unknown
        run: cargo build -p luna-core --target wasm32-unknown-unknown
      - name: cargo build -p luna-core --target wasm32-unknown-unknown --release
        run: cargo build -p luna-core --target wasm32-unknown-unknown --release

  # ─────────────────────────────────────────────────────────────────
  # cargo doc: catches dangling intra-doc links and undocumented
  # public items (luna-core declares missing_docs warn-by-default
  # in lib.rs once F2 lands; for v1.1 in progress this stays soft).
  # ─────────────────────────────────────────────────────────────────
  doc:
    name: cargo doc --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo doc --workspace --no-deps
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # ─────────────────────────────────────────────────────────────────
  # v1.2 L4-L5: lint gates (fmt + clippy). The 606 fmt drift was cleared
  # in v1.2 L1; the 12 historic clippy errors in L2; workspace-level
  # `[lints.clippy]` policy in L6. From v1.2 forward, both gates fail
  # the build on any new drift.
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ─────────────────────────────────────────────────────────────────
  # v1.2 D2 (P-A1 audit): perf-gate bench job. Linux runner + taskset
  # for ~1-2% variance band on `redis_lua_shape`. Manual trigger only
  # until D6 lands the regression-detection gate. macOS local: ~2.5%
  # via `cargo bench --bench redis_lua_shape`.
  #
  # The hosted ubuntu-latest is shared infra; taskset gives a soft
  # CPU pin (one core). criterion's 100-sample / 8s measurement window
  # absorbs the residual jitter.
  # ─────────────────────────────────────────────────────────────────
  perf-gate:
    name: redis_lua_shape perf-gate (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo bench --bench redis_lua_shape (taskset -c 1)
        run: taskset -c 1 cargo bench --bench redis_lua_shape -- --measurement-time 8 --warm-up-time 2

  # ─────────────────────────────────────────────────────────────────
  # v1.1 F1 + v1.2 G: luna-core's 0 third-party dep contract.
  # `cargo tree -p luna-core --prefix none` lists exactly one crate
  # (luna-core itself); anything else is a regression. CI fails fast.
  # ─────────────────────────────────────────────────────────────────
  zero-dep:
    name: luna-core zero-third-party-dep contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo tree -p luna-core
        run: |
          count=$(cargo tree -p luna-core --prefix none --no-default-features 2>/dev/null \
                  | grep -cE ' v[0-9]')
          echo "luna-core dep count = $count"
          if [ "$count" != "1" ]; then
            echo "::error::luna-core gained a third-party dependency (count=$count, expected 1)"
            cargo tree -p luna-core --prefix none --no-default-features
            exit 1
          fi
