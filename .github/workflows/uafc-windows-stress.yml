# v2.13 Track WUC Prong B — UAF-C repro-rate measurement + stack
# capture.
#
# gc.lua / gengc.lua / tracegc.lua loop on windows-latest via the
# gc_stress_plain harness (native Windows Heap Manager — the
# environment where STATUS_ACCESS_VIOLATION historically fires),
# plus a poison-allocator lane reproducing the MSVC debug-heap
# 0xDD fill. Run 28601903484 confirmed repro: plain AVs at
# iter 4, poison at iter 1. WER LocalDumps captured nothing
# (WER disabled on GHA runners), so the test binary runs under
# Sysinternals procdump (-e: unhandled-exception dump) and the
# dump is stack-walked with cdb. Dispatch-only diagnostic.
# Tracking: .dev/known-bugs/windows-gc-weak-table-uaf-c.md

name: uafc-windows-stress

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "stress loop iterations per harness"
        default: "50"
        required: false

jobs:
  stress:
    name: gc.lua stress ${{ matrix.harness }} (windows)
    runs-on: windows-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        harness: [gc_stress_plain, gc_stress_poison]
    env:
      RUST_BACKTRACE: full
      CARGO_TERM_COLOR: always
      # Full debuginfo in the release diagnostic build so the cdb
      # stack walk resolves Rust symbols + lines from the PDB.
      CARGO_PROFILE_RELEASE_DEBUG: "true"
      LUNA_GC_STRESS_N: ${{ inputs.iterations }}
      LUNA_POISON_STRESS_N: ${{ inputs.iterations }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable

      - name: Install procdump
        shell: pwsh
        run: |
          choco install procdump -y --no-progress | Out-Null
          New-Item -Path "$env:GITHUB_WORKSPACE\crashdumps" -ItemType Directory -Force | Out-Null

      - name: Build harness (grab test-binary path)
        id: build
        shell: pwsh
        run: |
          $json = cargo test --release -p luna-core --test ${{ matrix.harness }} --no-run --message-format=json 2>$null
          $exe = ($json | ConvertFrom-Json -AsHashtable -ErrorAction SilentlyContinue |
            Where-Object { $_.executable -and $_.target.name -eq "${{ matrix.harness }}" } |
            Select-Object -Last 1).executable
          if (-not $exe) { throw "test binary not found in cargo JSON output" }
          Write-Host "test binary: $exe"
          "exe=$exe" >> $env:GITHUB_OUTPUT

      - name: Stress loop under procdump
        shell: pwsh
        run: |
          # -e: write dump on unhandled exception; -ma: full memory.
          # procdump propagates the debuggee's exit code.
          procdump -accepteula -e -ma -x "$env:GITHUB_WORKSPACE\crashdumps" `
            "${{ steps.build.outputs.exe }}" --ignored --nocapture
          exit $LASTEXITCODE

      - name: Stack from minidump (on crash)
        if: failure()
        shell: pwsh
        run: |
          $dumps = Get-ChildItem "$env:GITHUB_WORKSPACE\crashdumps" -Filter *.dmp -ErrorAction SilentlyContinue
          if (-not $dumps) { Write-Host "no minidump found"; exit 0 }
          $cdb = "C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe"
          if (-not (Test-Path $cdb)) {
            Write-Host "cdb missing; installing windbg portable via choco"
            choco install windbg -y --no-progress | Out-Null
          }
          if (-not (Test-Path $cdb)) { Write-Host "cdb still missing; dump uploads raw"; exit 0 }
          $deps = "$env:GITHUB_WORKSPACE\target\release\deps"
          foreach ($d in $dumps) {
            Write-Host "===== $($d.Name)"
            & $cdb -z $d.FullName -c ".sympath `"$deps`"; .reload /f; .ecxr; .lines; kv 40; q" 2>&1 | Select-Object -First 400
          }

      - name: Upload crash dumps + symbols
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uafc-crashdumps-${{ matrix.harness }}
          path: |
            crashdumps/*.dmp
            target/release/deps/${{ matrix.harness }}-*.pdb
          if-no-files-found: ignore
