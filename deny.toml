[graph]
all-features = false
no-default-features = false
exclude-dev = false

[output]
feature-depth = 1

# ─────────────────────────────────────────────────────────────────────
# Advisories — RustSec database checks for known vulnerabilities.
# ─────────────────────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

# ─────────────────────────────────────────────────────────────────────
# Licenses — only permissive, no GPL contamination.
# ─────────────────────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    # BSL-1.0 (Boost Software License 1.0) — OSI-approved, FSF-Free,
    # permissive with no source-disclosure / no advertising clauses.
    # Pulled in transitively on Windows hosts through rustyline →
    # clipboard-win + error-code. Equivalent permissiveness to MIT for
    # our embedder-facing surface.
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93

# Per-crate license exceptions — surgical opt-in for copyleft licenses
# that only enter the workspace through documented opt-in features.
# CDDL stays out of the global allow list above (project charter:
# "permissive only, no copyleft contamination"); users who enable the
# `flame-graph` feature on luna-tools accept the copyleft license
# explicitly when they do so.
exceptions = [
    # `inferno` (CDDL-1.0): flame-graph rendering for luna-profile.
    # Pulled only via `luna-tools` opt-in `flame-graph` feature
    # (`crates/luna-tools/Cargo.toml::[features] flame-graph = ["dep:inferno", "dep:pprof"]`).
    # cargo-deny inspects every crate in Cargo.lock regardless of
    # feature gating, so the exception is required even though
    # default builds never enable the feature.
    { allow = ["CDDL-1.0"], name = "inferno" },
]

# ─────────────────────────────────────────────────────────────────────
# Bans — luna-core's 0-third-party-dep contract.
#
# The hard rule is enforced separately by CI step:
#     cargo tree -p luna-core --prefix none | grep -cE " v[0-9]"
#     # must return 1
#
# This [bans] section catches the *workspace*-level concerns:
# duplicate versions of any dep, accidental wildcard deps, etc.
# ─────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
# v2.1 Phase 1K.D.2 — `luna-jit-llvm` has a `[dev-dependencies]
# luna-jit = { path = "../luna-jit" }` to drive integration tests that
# need luna-jit's parser. cargo-deny classifies path-only deps as
# wildcards (`version = "*"`), but the lockfile-pinned workspace path
# is the safest possible reference — there is no version-range surface
# for a supply-chain attack to target. Setting this flag tells deny to
# only complain about wildcards that point at the registry, which is
# what "wildcards = deny" is actually meant to catch.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

allow = []
deny = []
# v2.1 Path D Phase 1A — vendored cranelift / wasmtime fork pulls
# `wasmtime-internal-jit-icache-coherence v37.0.3` (Cargo.lock new
# entry) which transitively depends on `windows-sys 0.60.2` →
# `windows-targets 0.53.5` → `windows_x86_64_msvc 0.53.1` and the
# matching per-arch sibling crates. The pre-existing `region 3.0.2`
# chain (under cranelift-jit) still resolves the older `windows-sys
# 0.52.0` → `windows-targets 0.52.6` set. This is a transitional
# duplication that goes away once cranelift / wasmtime themselves
# bump `region` (upstream issue, not actionable from luna).
# `multiple-versions = "warn"` keeps the duplication visible without
# failing CI; the explicit skip list documents the known set we accept.
skip = [
    # Windows per-architecture stub crates pulled in two versions
    # via the region / wasmtime split above.
    "windows_x86_64_msvc",
    "windows_x86_64_gnu",
    "windows_x86_64_gnullvm",
    "windows_i686_msvc",
    "windows_i686_gnu",
    "windows_i686_gnullvm",
    "windows_aarch64_msvc",
    "windows_aarch64_gnullvm",
    "windows-sys",
    "windows-targets",
    # `object` is pulled at v0.36 by luna-aot / luna-tools (the
    # downstream object-write surface luna pins) and at v0.37 via
    # backtrace → dhat (luna-core dev-dep) and via cranelift-codegen
    # → wasmtime-internal-jit-icache-coherence. backtrace's bump
    # tracks upstream; luna's direct dep stays on 0.36 for the v2.1
    # ship surface.
    "object",
    # `bitflags` and `hashbrown` are both pulled in two versions by
    # the cranelift / wasmtime split (older inside region/windows-sys,
    # newer inside the vendored wasmtime tree).
    "bitflags",
    "hashbrown",
]
skip-tree = []

# ─────────────────────────────────────────────────────────────────────
# Sources — only crates.io and the official rustsec repo.
# Embedders auditing luna's supply chain see a clean source list.
# ─────────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
